name: Auto Deploy Exam System

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 72.61.169.95
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /docker/app/exam-biometric/Exam-Biometric
          git pull origin main
          
          echo "Restarting backend..."
          pm2 restart exam-system || pm2 start dist/index.cjs --name exam-system
          
          echo "Rebuilding frontend..."
          cd client
          npm install
          npm run build
          
          echo "Deployment Finished 🚀"
